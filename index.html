<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Image Puzzle: Gen-Z Edition</title>
    <script>
      // Fix for "Cannot set property fetch of #<Window>" and other Node-globals
      // This happens when some Node-targeted library tries to polyfill globals on the window object.
      (function() {
        // Define global and process if missing
        if (typeof global === 'undefined') {
          window.global = window;
        }
        if (typeof process === 'undefined') {
          window.process = { env: {} };
        }

        const nativeFetch = window.fetch;
        if (nativeFetch) {
          try {
            Object.defineProperty(window, 'fetch', {
              configurable: true,
              enumerable: true,
              get: () => nativeFetch,
              set: (v) => {
                console.warn('Prevented overwriting window.fetch');
              }
            });
          } catch (e) {
            // If we can't redefine it, it's likely already protected
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
